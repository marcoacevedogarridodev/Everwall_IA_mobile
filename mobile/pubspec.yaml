name: pixel_app
description: Aplicación estilo Instagram/Facebook con grilla infinita de píxeles, compra, likes, chat y dark mode premium.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  flutter_native_splash: ^2.4.0

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI/UX
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animations: ^2.0.11

  # Image
  image_picker: ^1.0.7
  photo_view: ^0.15.0
  flutter_image_compress: ^2.1.0

  # Payment (agregado en Sprint 4)
  flutter_stripe: ^10.1.1

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.1.8

  # Push notifications (Sprint 8, spec 12.1) — requiere `flutterfire configure`
  # antes de usarse de verdad, ver README sección Notificaciones.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  package_info_plus: ^8.1.0

  # Deep links, offline support, analytics (Sprint 9, spec 12.2-12.4)
  app_links: ^6.3.2
  connectivity_plus: ^6.1.0
  firebase_analytics: ^11.3.3

  # Other
  url_launcher: ^6.2.4
  share_plus: ^11.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
  #   - family: SFProDisplay
  #     fonts:
  #       - asset: assets/fonts/SFProDisplay-Regular.ttf
  #       - asset: assets/fonts/SFProDisplay-Bold.ttf
  #         weight: 700

# Ícono real de la app (Sprint post-9): genera los íconos nativos de
# Android/iOS a partir de assets/images/logo.png. Después de correr
# `flutter pub get`, ejecuta:
#   dart run flutter_launcher_icons
# (o `flutter pub run flutter_launcher_icons` en versiones más viejas)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash.png"
  min_sdk_android: 21

# Splash screen NATIVO (lo que se ve mientras Android/iOS todavía están
# arrancando, ANTES de que exista cualquier widget de Flutter — ni
# siquiera `SplashScreen` de `lib/screens/splash_screen.dart` ha corrido
# todavía en ese momento). Está configurado para verse IDÉNTICO al
# `SplashScreen` de Flutter (mismo fondo negro, mismo ícono) para que no
# haya salto entre ambos — ver `NATIVE_SPLASH_SETUP.md` para el detalle
# completo y el paso a paso.
#
# Después de `flutter pub get` (y de tener `assets/images/logo.png` real,
# ver README), genera los assets nativos con:
#   dart run flutter_native_splash:create
# (o `flutter pub run flutter_native_splash:create` en versiones viejas)
flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  image: assets/images/splash.png
  image_dark: assets/images/splash.png

  # Sin texto, sin branding adicional — mismo criterio que el
  # SplashScreen de Flutter ("solo un ícono chico centrado sobre negro").
  fullscreen: true

  android: true
  ios: true
  web: false

  # Android 12+ usa la API de splash screen del propio sistema (distinta
  # a la de versiones anteriores), con sus propias reglas de tamaño: el
  # ícono se recorta a un círculo de ~240dp con ~160dp de contenido
  # visible en el centro. Se declara aparte para que también quede fondo
  # negro + el mismo logo, en vez de caer al ícono del launcher por
  # defecto (que se ve distinto y rompe la ilusión de "un solo splash").
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/images/splash.png
    image_dark: assets/images/splash.png
    icon_background_color: "#000000"
    icon_background_color_dark: "#000000"
