name: pixel_app
description: Aplicación estilo Instagram/Facebook con grilla infinita de píxeles, compra, likes, chat y dark mode premium.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI/UX
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animations: ^2.0.11

  # Image
  image_picker: ^1.0.7
  photo_view: ^0.15.0
  flutter_image_compress: ^2.1.0

  # Payment (agregado en Sprint 4)
  flutter_stripe: ^10.1.1

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.1.8

  # Other
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # NOTA: descomenta y agrega tus archivos reales en assets/images, assets/fonts
  # y assets/animations antes de habilitar esta sección, o `flutter pub get`/build
  # fallará si las rutas no existen.
  # assets:
  #   - assets/images/
  #   - assets/animations/

  # fonts:
  #   - family: SFProDisplay
  #     fonts:
  #       - asset: assets/fonts/SFProDisplay-Regular.ttf
  #       - asset: assets/fonts/SFProDisplay-Bold.ttf
  #         weight: 700
