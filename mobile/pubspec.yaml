name: pixel_app
description: Aplicación estilo Instagram/Facebook con grilla infinita de píxeles, compra, likes, chat y dark mode premium.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI/UX
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animations: ^2.0.11

  # Image
  image_picker: ^1.0.7
  photo_view: ^0.15.0
  flutter_image_compress: ^2.1.0

  # Payment (agregado en Sprint 4)
  flutter_stripe: ^10.1.1

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.1.8

  # Push notifications (Sprint 8, spec 12.1) — requiere `flutterfire configure`
  # antes de usarse de verdad, ver README sección Notificaciones.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  package_info_plus: ^8.1.0

  # Deep links, offline support, analytics (Sprint 9, spec 12.2-12.4)
  app_links: ^6.3.2
  connectivity_plus: ^6.1.0
  firebase_analytics: ^11.3.3

  # Other
  url_launcher: ^6.2.4
  share_plus: ^11.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
  #   - family: SFProDisplay
  #     fonts:
  #       - asset: assets/fonts/SFProDisplay-Regular.ttf
  #       - asset: assets/fonts/SFProDisplay-Bold.ttf
  #         weight: 700

# Ícono real de la app (Sprint post-9): genera los íconos nativos de
# Android/iOS a partir de assets/images/logo.png. Después de correr
# `flutter pub get`, ejecuta:
#   dart run flutter_launcher_icons
# (o `flutter pub run flutter_launcher_icons` en versiones más viejas)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

